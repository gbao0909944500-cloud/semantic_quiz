  <style>
    :root{--text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);--text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);--text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);--space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;--font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter',sans-serif;--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fff;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#6b685f;--color-primary:#01696f;--color-primary-hover:#0c4e54;--color-primary-highlight:#cedcd8;--color-success:#437a22;--color-error:#a12c7b;--radius-md:.8rem;--radius-lg:1.1rem;--radius-xl:1.5rem;--shadow-sm:0 1px 2px rgba(0,0,0,.06);--shadow-md:0 8px 24px rgba(0,0,0,.08)}

    .wrap{max-width:1040px;margin:0 auto;padding:var(--space-6)} .hero{padding:var(--space-10) 0 var(--space-8)} .topbar{display:flex;gap:var(--space-4);justify-content:space-between;align-items:center;margin-bottom:var(--space-8);flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;gap:.45rem;padding:.45rem .8rem;border-radius:999px;background:var(--color-surface);border:1px solid var(--color-border);font-size:var(--text-xs);color:var(--color-text-muted)}
    h1{font-family:var(--font-display);font-size:var(--text-2xl);line-height:1.02;margin:0 0 var(--space-3);letter-spacing:-.02em}.subtitle{max-width:70ch;color:var(--color-text-muted);font-size:var(--text-base);margin-bottom:var(--space-6)}
    .controls{display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center}button{cursor:pointer;border:none;font:inherit}.btn{padding:.85rem 1rem;border-radius:999px;background:var(--color-primary);color:#fff;font-size:var(--text-sm);font-weight:700;box-shadow:var(--shadow-sm)}.btn:hover{background:var(--color-primary-hover)}.btn.secondary{background:var(--color-surface);color:var(--color-text);border:1px solid var(--color-border)}

    .quiz-list{display:grid;gap:var(--space-5)}.card{background:linear-gradient(180deg,var(--color-surface),var(--color-surface-2));border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-md)}.q-top{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-4);margin-bottom:var(--space-3)}.q-num{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em}.unit{font-size:var(--text-xs);color:var(--color-primary);font-weight:800;background:var(--color-primary-highlight);padding:.35rem .6rem;border-radius:999px;min-width:1px}.question{font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4);max-width:62ch}
    .options{display:grid;gap:var(--space-3)}.option{width:100%;text-align:left;padding:1rem;border-radius:var(--radius-md);background:transparent;border:1px solid var(--color-border);color:var(--color-text);font-size:var(--text-base)}.option:hover{border-color:var(--color-primary);transform:translateY(-1px)}.option.correct{border-color:var(--color-success);background:color-mix(in srgb,var(--color-success) 12%,var(--color-surface))}.option.wrong{border-color:var(--color-error);background:color-mix(in srgb,var(--color-error) 12%,var(--color-surface))}

    @media (max-width:760px){.wrap{padding:var(--space-4)}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.q-top{flex-direction:column}.question{font-size:1.15rem}}

<script>
const quizData = [
  {unit:'',question:'Which statement is false?',options:['All utterance meaning is independent of context','Some expressions have variable reference','Paraphrase involves sameness of propositional content'],answer:0,explain:'The false statement is the first one: utterance meaning depends heavily on context. Cứ tách utterance khỏi context là em tự tháo pin khỏi máy.',adam:"Thầy Adam nói: đề đang hỏi “Which statement is false?”; đáp án đúng phải là “All utterance meaning is independent of context”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A sentence is best described as:',options:['A string of words put forward by someone in a situation','A linguistic expression type that can be uttered by different speakers on different occasions','Any meaningful sound made by a human'],answer:1,explain:'A sentence is an abstract linguistic expression; an utterance is the actual use. Nhầm hai cái này là mở bài đã trượt rồi.',adam:"Thầy Adam nói: đề đang hỏi “A sentence is best described as:”; đáp án đúng phải là “A linguistic expression type that can be uttered by different speakers on different occasions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'An utterance is:',options:['A concrete act of speaking or writing in a particular context','A dictionary entry with stable meaning','Always identical with a proposition'],answer:0,explain:'Utterance is a token event in context. Proposition is what may be expressed, not the event itself. Đừng cưới nhầm khái niệm.',adam:"Thầy Adam nói: đề đang hỏi “An utterance is:”; đáp án đúng phải là “A concrete act of speaking or writing in a particular context”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair can express the same proposition?',options:['Different sentences that are paraphrases','Any two grammatical sentences','Any two questions about the same topic'],answer:0,explain:'Paraphrases can express the same proposition. Same topic is not same proposition; nice try, but no.',adam:"Thầy Adam nói: đề đang hỏi “Which pair can express the same proposition?”; đáp án đúng phải là “Different sentences that are paraphrases”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is most likely to vary with speaker, place, or time?',options:['Reference of deictic expressions','Lexical category of nouns','Whether a predicate has an extension'],answer:0,explain:'Deictic reference shifts with context. Nouns do not suddenly resign from being nouns just because the clock moved.',adam:"Thầy Adam nói: đề đang hỏi “Which is most likely to vary with speaker, place, or time?”; đáp án đúng phải là “Reference of deictic expressions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The notion of proposition is most useful because it helps capture:',options:['Shared content across different utterances or sentence forms','Only pronunciation differences','Only spelling conventions'],answer:0,explain:'Proposition captures the common content. Orthography is not the star of semantics today, thankfully.',adam:"Thầy Adam nói: đề đang hỏi “The notion of proposition is most useful because it helps capture:”; đáp án đúng phải là “Shared content across different utterances or sentence forms”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If two utterances differ in wording but have the same truth conditions, they are most plausibly:',options:['Paraphrases','Antonyms','Performative contradictions'],answer:0,explain:'Same truth conditions strongly point to paraphrase. Nếu em chọn antonyms thì em đang tấn công chính sự sống logic.',adam:"Thầy Adam nói: đề đang hỏi “If two utterances differ in wording but have the same truth conditions, they are most plausibly:”; đáp án đúng phải là “Paraphrases”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which statement about context is correct?',options:['Context includes speaker, hearer, time, place, and relevant background','Context means only physical location','Context is irrelevant to utterance interpretation'],answer:0,explain:'Context is broad, not just location. Ai thu nhỏ context thành cái GPS thì đang làm nghèo ngôn ngữ.',adam:"Thầy Adam nói: đề đang hỏi “Which statement about context is correct?”; đáp án đúng phải là “Context includes speaker, hearer, time, place, and relevant background”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In “I am tired now”, the words most directly signalling deixis are:',options:['I and now','am and tired','I and tired'],answer:0,explain:'I and now depend directly on context. The copula and adjective are not doing the deictic heavy lifting.',adam:"Thầy Adam nói: đề đang hỏi “In “I am tired now”, the words most directly signalling deixis are:”; đáp án đúng phải là “I and now”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is a better example of an utterance than a sentence?',options:['John is late, said by Mary at 8 p.m. in class','John is late as a pattern of English words','late'],answer:0,explain:'An utterance is tied to an actual occasion. The abstract pattern is the sentence. Token vs type, please stop fighting it.',adam:"Thầy Adam nói: đề đang hỏi “Which is a better example of an utterance than a sentence?”; đáp án đúng phải là “John is late, said by Mary at 8 p.m. in class”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Reference is primarily a relation between:',options:['Expressions and entities in the world','Two synonyms in a dictionary','A speaker and grammar alone'],answer:0,explain:'Reference links expressions to entities. Synonymy is a sense relation, not reference. Different box, different headache.',adam:"Thầy Adam nói: đề đang hỏi “Reference is primarily a relation between:”; đáp án đúng phải là “Expressions and entities in the world”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Sense is closest to:',options:['An expression’s place in the semantic system of the language','A physical object pointed at','Only emotional tone'],answer:0,explain:'Sense concerns meaning relations within the language. Pointing at a chair is not the definition of sense, calm down.',adam:"Thầy Adam nói: đề đang hỏi “Sense is closest to:”; đáp án đúng phải là “An expression’s place in the semantic system of the language”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Two expressions may have the same reference but different sense. This is the classic point behind:',options:['Co-referring expressions such as “the morning star” and “the evening star”','All deictic pronouns','All antonym pairs'],answer:0,explain:'Co-reference does not guarantee sameness of sense. Same planet, different route to meaning. Frege would like a word.',adam:"Thầy Adam nói: đề đang hỏi “Two expressions may have the same reference but different sense. This is the classic point behind:”; đáp án đúng phải là “Co-referring expressions such as “the morning star” and “the evening star””. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A referring expression is one that:',options:['Can be used to identify or pick out an entity','Always functions as a predicate','Must contain an adjective'],answer:0,explain:'Referring expressions pick out entities. They do not need to wear adjectives as uniform.',adam:"Thầy Adam nói: đề đang hỏi “A referring expression is one that:”; đáp án đúng phải là “Can be used to identify or pick out an entity”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which item is most likely a non-referring expression in normal use?',options:['and','the dog','my teacher'],answer:0,explain:'Conjunctions do not refer. If and starts referring, the coursebook needs emergency surgery.',adam:"Thầy Adam nói: đề đang hỏi “Which item is most likely a non-referring expression in normal use?”; đáp án đúng phải là “and”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A constant-reference expression is one whose reference:',options:['Does not normally change from context to context','Is always vague','Must be fictional'],answer:0,explain:'Constant-reference expressions tend to keep the same referent across contexts. Variable reference is a different beast.',adam:"Thầy Adam nói: đề đang hỏi “A constant-reference expression is one whose reference:”; đáp án đúng phải là “Does not normally change from context to context”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A variable-reference expression is illustrated best by:',options:['I','the Pacific Ocean','Venus'],answer:0,explain:'I changes referent with speaker. Oceans and planets usually do not wake up and change jobs.',adam:"Thầy Adam nói: đề đang hỏi “A variable-reference expression is illustrated best by:”; đáp án đúng phải là “I”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which statement about proper names in introductory semantics is safest?',options:['They are typically treated as referring expressions','They are typically treated as connectives','They never have sense'],answer:0,explain:'Proper names are typically treated as referring expressions. The stronger claim that they never have sense is too neat to trust.',adam:"Thầy Adam nói: đề đang hỏi “Which statement about proper names in introductory semantics is safest?”; đáp án đúng phải là “They are typically treated as referring expressions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“The present king of France” is important in semantics because it shows that:',options:['A grammatically normal referring expression may fail to have a real-world referent','All definite descriptions are false','Sense and reference are identical'],answer:0,explain:'The expression is meaningful even without a current referent. Grammar can look fine while reality refuses to cooperate.',adam:"Thầy Adam nói: đề đang hỏi ““The present king of France” is important in semantics because it shows that:”; đáp án đúng phải là “A grammatically normal referring expression may fail to have a real-world referent”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the best statement about sense and reference?',options:['Expressions can have sense even when they lack actual reference','Anything with sense must point to a real object','Reference matters only for pronouns'],answer:0,explain:'Sense can exist without actual reference. Unicorns thank you for finally understanding this.',adam:"Thầy Adam nói: đề đang hỏi “Which is the best statement about sense and reference?”; đáp án đúng phải là “Expressions can have sense even when they lack actual reference”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The predicator in a clause is the element that:',options:['Makes the most specific semantic contribution outside the referring expressions','Always comes first in the sentence','Must be a noun'],answer:0,explain:'Predicator contributes the main relation or property. It is not required to stand in front like a class monitor.',adam:"Thầy Adam nói: đề đang hỏi “The predicator in a clause is the element that:”; đáp án đúng phải là “Makes the most specific semantic contribution outside the referring expressions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In “The old man opened the door”, the predicator is:',options:['opened','the old man','door'],answer:0,explain:'Opened is the predicator. Subjects and objects are not suddenly predicators because they look important.',adam:"Thầy Adam nói: đề đang hỏi “In “The old man opened the door”, the predicator is:”; đáp án đúng phải là “opened”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A one-place predicate typically requires:',options:['One argument','No argument','Exactly three arguments'],answer:0,explain:'One-place predicates take one argument. Naming conventions are not decorative; please use them.',adam:"Thầy Adam nói: đề đang hỏi “A one-place predicate typically requires:”; đáp án đúng phải là “One argument”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A two-place predicate typically expresses:',options:['A relation between two entities','A property of one entity only','A speech act condition'],answer:0,explain:'Two-place predicates express relations between two arguments. If there are two slots, use your eyes.',adam:"Thầy Adam nói: đề đang hỏi “A two-place predicate typically expresses:”; đáp án đúng phải là “A relation between two entities”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In “Mary gave John a book”, the main predicate is often analysed as:',options:['Three-place','One-place','Zero-place'],answer:0,explain:'Give commonly takes three arguments: giver, recipient, thing given. It is not a minimalist verb.',adam:"Thầy Adam nói: đề đang hỏi “In “Mary gave John a book”, the main predicate is often analysed as:”; đáp án đúng phải là “Three-place”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The sentence “John is tall” contains a predicate that is:',options:['One-place','Two-place','Three-place'],answer:0,explain:'Tall attributes a property to one entity. No second participant is hiding under the desk.',adam:"Thầy Adam nói: đề đang hỏi “The sentence “John is tall” contains a predicate that is:”; đáp án đúng phải là “One-place”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'What is the universe of discourse?',options:['The set of entities assumed relevant in a discussion or analysis','All words in the dictionary','Only fictional beings'],answer:0,explain:'Universe of discourse is the relevant domain of entities. Not the entire cosmos, despite the dramatic name.',adam:"Thầy Adam nói: đề đang hỏi “What is the universe of discourse?”; đáp án đúng phải là “The set of entities assumed relevant in a discussion or analysis”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which change is most likely to alter truth conditions?',options:['Changing the predicator from “kill” to “injure”','Changing font size','Changing speaker’s handwriting'],answer:0,explain:'Predicator choice changes content and truth conditions. Typography is not semantics, no matter how fancy the font.',adam:"Thầy Adam nói: đề đang hỏi “Which change is most likely to alter truth conditions?”; đáp án đúng phải là “Changing the predicator from “kill” to “injure””. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A predicate differs from a referring expression because a predicate typically:',options:['Contributes a property or relation rather than picking out an entity','Always names a unique individual','Can never be ambiguous'],answer:0,explain:'Predicates contribute properties/relations. Unique identification is the job of referring expressions. Everyone has a lane.',adam:"Thầy Adam nói: đề đang hỏi “A predicate differs from a referring expression because a predicate typically:”; đáp án đúng phải là “Contributes a property or relation rather than picking out an entity”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If a sentence contains two one-place predicates joined by and, it most naturally represents:',options:['A conjunction of two propositions','A single zero-place predicate','A contradiction by default'],answer:0,explain:'Two propositions can be conjoined. “By default contradiction” is the kind of answer written by optimism’s enemy.',adam:"Thầy Adam nói: đề đang hỏi “If a sentence contains two one-place predicates joined by and, it most naturally represents:”; đáp án đúng phải là “A conjunction of two propositions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Deixis concerns expressions whose interpretation depends on:',options:['Context of utterance','Morphological productivity','Word origin only'],answer:0,explain:'Deictic interpretation depends on context. Etymology is cute, but not the point here.',adam:"Thầy Adam nói: đề đang hỏi “Deixis concerns expressions whose interpretation depends on:”; đáp án đúng phải là “Context of utterance”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is deictic rather than purely descriptive?',options:['here / now','cat / animal','metal / brass'],answer:0,explain:'Here and now are classic deictics. The others are lexical meaning relations, not context-indexing expressions.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is deictic rather than purely descriptive?”; đáp án đúng phải là “here / now”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Definiteness is most closely associated with whether the speaker assumes the hearer can:',options:['Identify the intended referent','Compute truth tables','List derivational affixes'],answer:0,explain:'Definite use assumes identifiability. Truth tables do not help your hearer find the sandwich you mentioned.',adam:"Thầy Adam nói: đề đang hỏi “Definiteness is most closely associated with whether the speaker assumes the hearer can:”; đáp án đúng phải là “Identify the intended referent”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The difference between “a dog” and “the dog” is mainly one of:',options:['Definiteness','Predicate valency','Homonymy'],answer:0,explain:'The distinction is one of definiteness. Please do not drag homonymy into a problem that did not invite it.',adam:"Thầy Adam nói: đề đang hỏi “The difference between “a dog” and “the dog” is mainly one of:”; đáp án đúng phải là “Definiteness”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A deictic interpretation of “that woman” often relies on:',options:['Speaker location, gesture, or shared situational focus','Morphophonemic alternation','The number of syllables'],answer:0,explain:'Demonstratives often need situational cues. Syllables are innocent bystanders here.',adam:"Thầy Adam nói: đề đang hỏi “A deictic interpretation of “that woman” often relies on:”; đáp án đúng phải là “Speaker location, gesture, or shared situational focus”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which sentence most clearly contains deixis?',options:['I met her yesterday here','Cats are mammals','Gold is a metal'],answer:0,explain:'I, her, yesterday, and here are all context-sensitive. The other two are generic statements, not deictic fireworks.',adam:"Thầy Adam nói: đề đang hỏi “Which sentence most clearly contains deixis?”; đáp án đúng phải là “I met her yesterday here”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A generic statement such as “Cats are mammals” typically:',options:['Does not rely on immediate deictic context for its basic interpretation','Must contain a proper name','Is always false if one cat is unusual'],answer:0,explain:'Generics are not anchored to the immediate speech situation in the way deictics are. One weird cat does not destroy the category.',adam:"Thầy Adam nói: đề đang hỏi “A generic statement such as “Cats are mammals” typically:”; đáp án đúng phải là “Does not rely on immediate deictic context for its basic interpretation”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which item is normally interpreted deictically rather than by fixed reference?',options:['tomorrow','the Earth','the Pacific'],answer:0,explain:'Tomorrow shifts with time of utterance. The Earth has enough consistency to avoid this chaos.',adam:"Thầy Adam nói: đề đang hỏi “Which item is normally interpreted deictically rather than by fixed reference?”; đáp án đúng phải là “tomorrow”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If “the lecturer” can be understood only because all students know who is teaching, the phrase is functioning as:',options:['A definite referring expression','A one-place predicate','A contradiction trigger'],answer:0,explain:'It is definite because the hearer can identify the intended referent. No need to invent drama.',adam:"Thầy Adam nói: đề đang hỏi “If “the lecturer” can be understood only because all students know who is teaching, the phrase is functioning as:”; đáp án đúng phải là “A definite referring expression”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the best warning about deixis?',options:['Ignoring context may produce the wrong referent even when grammar is fine','Every deictic term is ambiguous in the dictionary sense','Deixis makes truth conditions impossible'],answer:0,explain:'Context can determine the referent. Grammar can be perfect and interpretation still fail. That is the whole annoying beauty of it.',adam:"Thầy Adam nói: đề đang hỏi “Which is the best warning about deixis?”; đáp án đúng phải là “Ignoring context may produce the wrong referent even when grammar is fine”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Extension refers to:',options:['The set of entities a predicate correctly applies to','The emotional aura around a word','The order of words in a sentence'],answer:0,explain:'Extension is the set of things the predicate applies to. Emotional aura belongs elsewhere. Stop sending connotation to do extension’s job.',adam:"Thầy Adam nói: đề đang hỏi “Extension refers to:”; đáp án đúng phải là “The set of entities a predicate correctly applies to”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A prototype is best understood as:',options:['A particularly central or representative member of a category','The total extension of a predicate','A deictic pronoun'],answer:0,explain:'Prototype is a central member, not the whole set. One robin is not every bird, thankfully.',adam:"Thầy Adam nói: đề đang hỏi “A prototype is best understood as:”; đáp án đúng phải là “A particularly central or representative member of a category”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair best illustrates that prototype structure and extension are not identical notions?',options:['Robin may be a better prototype of BIRD than penguin, though both are in the extension','Cat and dog are converses','Warm and cold are synonyms'],answer:0,explain:'Both can belong to the extension while differing in prototypicality. This is where students stop memorizing and start understanding.',adam:"Thầy Adam nói: đề đang hỏi “Which pair best illustrates that prototype structure and extension are not identical notions?”; đáp án đúng phải là “Robin may be a better prototype of BIRD than penguin, though both are in the extension”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A stereotypical feature differs from a necessary feature because it is:',options:['Commonly associated but not required in every case','Logically impossible','Always false'],answer:0,explain:'Stereotypes are common associations, not necessary conditions. Please do not make every bird fly; penguins are tired of your nonsense.',adam:"Thầy Adam nói: đề đang hỏi “A stereotypical feature differs from a necessary feature because it is:”; đáp án đúng phải là “Commonly associated but not required in every case”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If “bird” brings to mind flying and singing although some birds do neither, that shows the role of:',options:['Stereotypes or prototypes','Contradictories','Illocutionary force only'],answer:0,explain:'Typicality effects reflect stereotypes/prototypes. Not every semantic issue is secretly speech acts.',adam:"Thầy Adam nói: đề đang hỏi “If “bird” brings to mind flying and singing although some birds do neither, that shows the role of:”; đáp án đúng phải là “Stereotypes or prototypes”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which statement about extension is safest?',options:['Two predicates may differ in sense while sharing extension in some possible discussion','Every difference in sense guarantees a different extension in every circumstance','Extension is identical with connotation'],answer:0,explain:'Different senses can share extension in some circumstances. Sense and extension are related, not twins forced into one shirt.',adam:"Thầy Adam nói: đề đang hỏi “Which statement about extension is safest?”; đáp án đúng phải là “Two predicates may differ in sense while sharing extension in some possible discussion”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is about category centrality rather than membership boundary?',options:['Prototype','Extension','Contradictoriness'],answer:0,explain:'Prototype concerns centrality. Extension concerns membership. Please stop swapping the labels like mismatched suitcase tags.',adam:"Thầy Adam nói: đề đang hỏi “Which is about category centrality rather than membership boundary?”; đáp án đúng phải là “Prototype”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A category may have fuzzy edges but still be useful. This supports the importance of:',options:['Prototype-based understanding','Only necessary-and-sufficient definitions','Only truth-functional logic'],answer:0,explain:'Prototype effects help explain graded category judgments. Human categorization is not a robot in a tie.',adam:"Thầy Adam nói: đề đang hỏi “A category may have fuzzy edges but still be useful. This supports the importance of:”; đáp án đúng phải là “Prototype-based understanding”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which option fits extension best?',options:['All actual cats belong to the extension of CAT','The most typical cat alone','The speaker’s annoyance with cats'],answer:0,explain:'Extension is the full set of cats, not one mascot cat and definitely not your mood.',adam:"Thầy Adam nói: đề đang hỏi “Which option fits extension best?”; đáp án đúng phải là “All actual cats belong to the extension of CAT”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If an item is atypical yet still inside the category, that is evidence against confusing:',options:['Prototype with extension','Reference with deixis','Sentence with utterance'],answer:0,explain:'Atypical members show that prototypicality is not the same as category membership. This is where lazy definitions go to die.',adam:"Thầy Adam nói: đề đang hỏi “If an item is atypical yet still inside the category, that is evidence against confusing:”; đáp án đúng phải là “Prototype with extension”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A synthetic sentence is one whose truth depends on:',options:['How the world is','Only word meanings','Only punctuation'],answer:0,explain:'Synthetic truth depends on facts about the world. Semantics alone cannot rescue a false weather report.',adam:"Thầy Adam nói: đề đang hỏi “A synthetic sentence is one whose truth depends on:”; đáp án đúng phải là “How the world is”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'An analytic sentence is true by virtue of:',options:['Meaning relations among its words','Current weather conditions','The speaker’s sincerity'],answer:0,explain:'Analytic truth comes from meaning. Rain outside is irrelevant, no matter how dramatic it is.',adam:"Thầy Adam nói: đề đang hỏi “An analytic sentence is true by virtue of:”; đáp án đúng phải là “Meaning relations among its words”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A contradiction is a sentence that is:',options:['Necessarily false given its meanings','Always rude','Only false when uttered sarcastically'],answer:0,explain:'Contradictions are semantically impossible. Sarcasm is not the rescue helicopter.',adam:"Thầy Adam nói: đề đang hỏi “A contradiction is a sentence that is:”; đáp án đúng phải là “Necessarily false given its meanings”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“This bachelor is married” is classically treated as:',options:['A contradiction','An analytic truth','A deictic sentence'],answer:0,explain:'Bachelor and married clash semantically in the classic treatment. If you picked deictic, go drink water and return.',adam:"Thầy Adam nói: đề đang hỏi ““This bachelor is married” is classically treated as:”; đáp án đúng phải là “A contradiction”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“All bachelors are unmarried” is classically treated as:',options:['Analytic','Synthetic','Ambiguous'],answer:0,explain:'It is analytic because unmarried is built into the meaning of bachelor. Easy point, please do not overthink yourself into danger.',adam:"Thầy Adam nói: đề đang hỏi ““All bachelors are unmarried” is classically treated as:”; đáp án đúng phải là “Analytic”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is most likely synthetic?',options:['My neighbour owns three bicycles','All squares have four sides','No bachelor is married'],answer:0,explain:'Owning three bicycles depends on facts, not on lexical meaning. Reality has entered the chat.',adam:"Thầy Adam nói: đề đang hỏi “Which is most likely synthetic?”; đáp án đúng phải là “My neighbour owns three bicycles”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If one sentence entails another, then whenever the first is true, the second must be:',options:['True','False','Ambiguous'],answer:0,explain:'That is the point of entailment. If you break that, the relation stops being entailment. Simple and brutal.',adam:"Thầy Adam nói: đề đang hỏi “If one sentence entails another, then whenever the first is true, the second must be:”; đáp án đúng phải là “True”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which relation is most likely symmetric?',options:['Paraphrase','Entailment','Hyponymy'],answer:0,explain:'Paraphrase is symmetric; entailment and hyponymy are directional. Arrows matter. Please respect the arrows.',adam:"Thầy Adam nói: đề đang hỏi “Which relation is most likely symmetric?”; đáp án đúng phải là “Paraphrase”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A sentence can be informative and still analytic?',options:['In principle it may feel informative to a learner, though semantically analytic','No, analytic sentences can never tell anyone anything','Only if shouted loudly'],answer:0,explain:'Analyticity is a semantic property; informativeness to a learner is different. Loudness still fails to be a semantic category.',adam:"Thầy Adam nói: đề đang hỏi “A sentence can be informative and still analytic?”; đáp án đúng phải là “In principle it may feel informative to a learner, though semantically analytic”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair most plausibly stands in entailment rather than paraphrase?',options:['John murdered Bill / Bill died','John murdered Bill / Bill was murdered by John','The door is open / The door is not open'],answer:0,explain:'Murder entails death, but is not paraphrase. The second pair is much closer to paraphrase. Learn the difference before the exam teaches it rudely.',adam:"Thầy Adam nói: đề đang hỏi “Which pair most plausibly stands in entailment rather than paraphrase?”; đáp án đúng phải là “John murdered Bill / Bill died”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A hyponym is:',options:['A more specific term included in a more general term','A word with opposite meaning','A context-dependent pronoun'],answer:0,explain:'A hyponym is the more specific member in a taxonomic relation. Opposites are having a different meeting.',adam:"Thầy Adam nói: đề đang hỏi “A hyponym is:”; đáp án đúng phải là “A more specific term included in a more general term”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If X is a hyponym of Y, then the sense of X includes the sense of:',options:['Y','X only','Neither'],answer:0,explain:'The more specific term includes the more general one in its sense. That is the inclusion relation. Please do not invert it for sport.',adam:"Thầy Adam nói: đề đang hỏi “If X is a hyponym of Y, then the sense of X includes the sense of:”; đáp án đúng phải là “Y”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which sentence pair best illustrates entailment based on hyponymy?',options:['John saw a tulip / John saw a flower','John saw a flower / John saw a tulip','John saw a flower / John did not see a flower'],answer:0,explain:'Tulip is a kind of flower, so the first entails the second. Reverse direction does not hold. Logic is not charity.',adam:"Thầy Adam nói: đề đang hỏi “Which sentence pair best illustrates entailment based on hyponymy?”; đáp án đúng phải là “John saw a tulip / John saw a flower”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Co-hyponyms are terms that:',options:['Share a superordinate but do not include one another in sense','Are exact synonyms','Must be deictic'],answer:0,explain:'Co-hyponyms share a higher category. Cat and dog are not synonyms just because both annoy your sofa.',adam:"Thầy Adam nói: đề đang hỏi “Co-hyponyms are terms that:”; đáp án đúng phải là “Share a superordinate but do not include one another in sense”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is a safer claim about hyponymy?',options:['It is directional, not symmetric','It is identical with antonymy','It always guarantees co-reference'],answer:0,explain:'Hyponymy is directional. If you make it symmetric, every taxonomy collapses like wet cardboard.',adam:"Thầy Adam nói: đề đang hỏi “Which is a safer claim about hyponymy?”; đáp án đúng phải là “It is directional, not symmetric”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If “scarlet” is a hyponym of “red”, then “This is scarlet” entails:',options:['This is red','This is blue','This is colourless'],answer:0,explain:'Scarlet includes redness. Blue and colourless can go sit somewhere else.',adam:"Thầy Adam nói: đề đang hỏi “If “scarlet” is a hyponym of “red”, then “This is scarlet” entails:”; đáp án đúng phải là “This is red”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is not a good example of hyponymy?',options:['buy / purchase as near-synonyms','rose / flower','poodle / dog'],answer:0,explain:'Buy and purchase are much closer to synonymy than hyponymy. Different relation, same exam paper, tragic confusion.',adam:"Thầy Adam nói: đề đang hỏi “Which is not a good example of hyponymy?”; đáp án đúng phải là “buy / purchase as near-synonyms”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The Basic Rule of Sense Inclusion links a word relation with a sentence relation. That sentence relation is usually:',options:['Entailment','Contradictoriness','Illocutionary force'],answer:0,explain:'Hyponymy in predicates is reflected in entailment between sentences in basic cases. Please do not drag Austin into every room.',adam:"Thầy Adam nói: đề đang hỏi “The Basic Rule of Sense Inclusion links a word relation with a sentence relation. That sentence relation is usually:”; đáp án đúng phải là “Entailment”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which statement is strongest and still safe?',options:['Every tulip is a flower, but not every flower is a tulip','Every flower is a tulip','Tulip and flower are contradictories'],answer:0,explain:'That is the correct asymmetry. If all flowers were tulips, florists would have a very boring life.',adam:"Thầy Adam nói: đề đang hỏi “Which statement is strongest and still safe?”; đáp án đúng phải là “Every tulip is a flower, but not every flower is a tulip”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A superordinate term is:',options:['The more general category term','The more specific category term','A synonym in disguise'],answer:0,explain:'Superordinate means higher/more general. Stop making “general” and “specific” exchange clothes.',adam:"Thầy Adam nói: đề đang hỏi “A superordinate term is:”; đáp án đúng phải là “The more general category term”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Absolute synonymy is often treated as:',options:['Rare or doubtful in natural language','The normal case for most vocabulary','Identical with homonymy'],answer:0,explain:'Perfect synonymy is usually treated as rare. Languages are messy because humans built them, not mathematicians.',adam:"Thầy Adam nói: đề đang hỏi “Absolute synonymy is often treated as:”; đáp án đúng phải là “Rare or doubtful in natural language”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If two predicates are synonyms, replacing one with the other in a sentence typically preserves:',options:['Core propositional meaning','Orthographic style only','Speaker identity'],answer:0,explain:'Synonyms preserve core meaning in normal contexts. Spelling style and speaker identity are not the prize here.',adam:"Thầy Adam nói: đề đang hỏi “If two predicates are synonyms, replacing one with the other in a sentence typically preserves:”; đáp án đúng phải là “Core propositional meaning”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is the best candidate for paraphrase rather than mere relatedness?',options:['John purchased a car / John bought a car','John bought a car / John drove a car','John likes cars / John repairs cars'],answer:0,explain:'Purchase and buy are near-synonymous here, so the sentences paraphrase well. Related is not the same as same.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is the best candidate for paraphrase rather than mere relatedness?”; đáp án đúng phải là “John purchased a car / John bought a car”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Why are true synonyms hard to find?',options:['Words often differ in style, collocation, dialect, or nuance even when close in meaning','Because dictionaries ban them','Because every word is deictic'],answer:0,explain:'Natural language keeps small differences around. Meaning is untidy, and yes, that is legal.',adam:"Thầy Adam nói: đề đang hỏi “Why are true synonyms hard to find?”; đáp án đúng phải là “Words often differ in style, collocation, dialect, or nuance even when close in meaning”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If two sentences are paraphrases, then they normally:',options:['Entail each other','Contradict each other','Must use the same words'],answer:0,explain:'Paraphrases are mutual entailments in effect. Same words are not required; same proposition is the target.',adam:"Thầy Adam nói: đề đang hỏi “If two sentences are paraphrases, then they normally:”; đáp án đúng phải là “Entail each other”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which option shows near-synonymy with probable stylistic difference?',options:['begin / commence','begin / explode','begin / below'],answer:0,explain:'Begin and commence are close, but style/register differs. This is why “synonym” questions love traps.',adam:"Thầy Adam nói: đề đang hỏi “Which option shows near-synonymy with probable stylistic difference?”; đáp án đúng phải là “begin / commence”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A good caution about synonymy is:',options:['Context can block substitution even between close synonyms','Any synonym can replace the other in every frame','Synonymy is identical to hyponymy'],answer:0,explain:'Substitution may fail because of collocation or style. Language has preferences; it is annoyingly human.',adam:"Thầy Adam nói: đề đang hỏi “A good caution about synonymy is:”; đáp án đúng phải là “Context can block substitution even between close synonyms”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If “sofa” and “couch” are treated as synonyms in many contexts, the sentence relation between “The cat is on the sofa” and “The cat is on the couch” is closest to:',options:['Paraphrase','Contradiction','Gradable antonymy'],answer:0,explain:'The two sentences are near-paraphrases in many contexts. Antonymy is not hiding in your living room furniture.',adam:"Thầy Adam nói: đề đang hỏi “If “sofa” and “couch” are treated as synonyms in many contexts, the sentence relation between “The cat is on the sofa” and “The cat is on the couch” is closest to:”; đáp án đúng phải là “Paraphrase”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is a better summary?',options:['Synonymy is a relation between expressions; paraphrase is a relation between larger expressions like sentences','Synonymy and paraphrase are the same thing at all levels','Paraphrase is a relation only between words'],answer:0,explain:'Synonymy is for words/phrases, paraphrase for sentences or larger expressions. Different levels, same disappointed teacher.',adam:"Thầy Adam nói: đề đang hỏi “Which is a better summary?”; đáp án đúng phải là “Synonymy is a relation between expressions; paraphrase is a relation between larger expressions like sentences”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'One reason “father” and “dad” are not perfect synonyms is difference in:',options:['Register or style','Truth conditions of every sentence','Part of speech'],answer:0,explain:'Register matters. Same broad referential meaning does not erase stylistic difference. Subtlety exists; accept it.',adam:"Thầy Adam nói: đề đang hỏi “One reason “father” and “dad” are not perfect synonyms is difference in:”; đáp án đúng phải là “Register or style”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Binary antonyms are pairs such that:',options:['The positive application of one implies the negation of the other and vice versa in basic cases','They lie on an open scale with many middle values','They name two participants in a relation'],answer:0,explain:'Binary antonyms are two-way oppositions like dead/alive in clear cases. Not every opposite lives on a fuzzy scale.',adam:"Thầy Adam nói: đề đang hỏi “Binary antonyms are pairs such that:”; đáp án đúng phải là “The positive application of one implies the negation of the other and vice versa in basic cases”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Gradable antonyms differ from binary antonyms because they:',options:['Occupy opposite ends of a scale and allow intermediates','Always entail contradictions in every quantified sentence','Are always nouns'],answer:0,explain:'Gradable antonyms involve a scale. If you force them into binary boxes, the scale will laugh at you.',adam:"Thầy Adam nói: đề đang hỏi “Gradable antonyms differ from binary antonyms because they:”; đáp án đúng phải là “Occupy opposite ends of a scale and allow intermediates”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is most plausibly gradable?',options:['hot / cold','male / female','dead / alive'],answer:0,explain:'Hot and cold allow intermediate values like warm or cool. Dead is not a hobby level.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is most plausibly gradable?”; đáp án đúng phải là “hot / cold”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A common test for gradability is whether the word combines naturally with:',options:['very or how','therefore','yesterday'],answer:0,explain:'Very/how are useful diagnostics. “How dead is he?” is exactly the kind of sentence that gets you stared at.',adam:"Thầy Adam nói: đề đang hỏi “A common test for gradability is whether the word combines naturally with:”; đáp án đúng phải là “very or how”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is best treated as converse terms?',options:['buy / sell','hot / cold','cat / dog'],answer:0,explain:'Converses describe the same relation from opposite participant perspectives. Buy/sell is the classic case. Finally, a clean one.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is best treated as converse terms?”; đáp án đúng phải là “buy / sell”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Multiple incompatibility is illustrated best by members of:',options:['An open set like animal names','A single pair like dead/alive','A scale like hot/cold'],answer:0,explain:'Many co-members of an open category are mutually incompatible in basic predication. Cat and dog do not exhaust the universe.',adam:"Thầy Adam nói: đề đang hỏi “Multiple incompatibility is illustrated best by members of:”; đáp án đúng phải là “An open set like animal names”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is most likely multiple incompatibles rather than binary antonyms?',options:['cat / dog','pass / fail','true / false'],answer:0,explain:'Cat and dog are co-hyponyms within an open set. Binary oppositions are a different party.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is most likely multiple incompatibles rather than binary antonyms?”; đáp án đúng phải là “cat / dog”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If “John is taller than Bill” and “Bill is shorter than John” express the same situation from different angles, the relation between taller than and shorter than is:',options:['Converseness','Synonymy','Homonymy'],answer:0,explain:'These are converse relational expressions. Same relation, different orientation. Please stop calling everything synonymy.',adam:"Thầy Adam nói: đề đang hỏi “If “John is taller than Bill” and “Bill is shorter than John” express the same situation from different angles, the relation between taller than and shorter than is:”; đáp án đúng phải là “Converseness”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which sentence pair is most clearly contradictory in the simple basic sense?',options:['This mouse is dead / This mouse is alive','This soup is hot / This soup is cold','John bought a car / John purchased a car'],answer:0,explain:'Dead and alive are classic contradictories in the basic case. Hot and cold can both fail, depending on context. Life is messy.',adam:"Thầy Adam nói: đề đang hỏi “Which sentence pair is most clearly contradictory in the simple basic sense?”; đáp án đúng phải là “This mouse is dead / This mouse is alive”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Why does “Some people love Californians” not straightforwardly contradict “Some people hate Californians”?',options:['Because the quantified individuals could be different','Because love and hate are synonyms','Because some always means all'],answer:0,explain:'Quantification matters: different people may satisfy the two sentences. This is where sloppy intuition gets punished, deservedly.',adam:"Thầy Adam nói: đề đang hỏi “Why does “Some people love Californians” not straightforwardly contradict “Some people hate Californians”?”; đáp án đúng phải là “Because the quantified individuals could be different”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A sentence is ambiguous if it has:',options:['Two or more distinct paraphrases that are not paraphrases of each other','More than one syllable','A pronoun'],answer:0,explain:'Ambiguity involves distinct meanings/paraphrases. Syllables are innocent again. Please stop accusing them.',adam:"Thầy Adam nói: đề đang hỏi “A sentence is ambiguous if it has:”; đáp án đúng phải là “Two or more distinct paraphrases that are not paraphrases of each other”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Lexical ambiguity arises when:',options:['A word has more than one sense','A structure groups the same words in two ways','A sentence contains two clauses'],answer:0,explain:'Lexical ambiguity comes from a word’s multiple senses. Structural ambiguity is the other trap waiting two pages later.',adam:"Thầy Adam nói: đề đang hỏi “Lexical ambiguity arises when:”; đáp án đúng phải là “A word has more than one sense”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Structural ambiguity arises when:',options:['The arrangement of words allows more than one interpretation even without an ambiguous word','A word has two dictionary senses','A sentence is ungrammatical'],answer:0,explain:'Structural ambiguity comes from different groupings/relations among words. Grammar can be perfect and still treacherous.',adam:"Thầy Adam nói: đề đang hỏi “Structural ambiguity arises when:”; đáp án đúng phải là “The arrangement of words allows more than one interpretation even without an ambiguous word”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“Visiting relatives can be boring” is a classic example because:',options:['It can mean the activity is boring or the relatives who are visiting are boring','Visiting and relatives are perfect synonyms','The sentence has no paraphrases'],answer:0,explain:'Exactly: two structures, two readings. The sentence is a trap with excellent manners.',adam:"Thầy Adam nói: đề đang hỏi ““Visiting relatives can be boring” is a classic example because:”; đáp án đúng phải là “It can mean the activity is boring or the relatives who are visiting are boring”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Homonymy differs from polysemy in that homonymous senses are usually:',options:['Far apart and not intuitively related','Closely related variations of one central sense','Always identical in reference'],answer:0,explain:'Homonymy involves unrelated senses; polysemy involves related ones. If you merge them, every dictionary editor cries.',adam:"Thầy Adam nói: đề đang hỏi “Homonymy differs from polysemy in that homonymous senses are usually:”; đáp án đúng phải là “Far apart and not intuitively related”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is the clearest homonymy candidate?',options:['bank (financial institution) / bank (side of river)','mouth of river / mouth of animal','run a race / run a program'],answer:0,explain:'Bank is the standard homonymy example. Mouth and run are more polysemous. The exam loves this difference because students do not.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is the clearest homonymy candidate?”; đáp án đúng phải là “bank (financial institution) / bank (side of river)”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair is the better polysemy candidate?',options:['mouth of a river / mouth of an animal','mug as vessel / mug as gullible person','punch as blow / punch as drink'],answer:0,explain:'The senses share an intuitive conceptual relation. That is polysemy, not coincidence.',adam:"Thầy Adam nói: đề đang hỏi “Which pair is the better polysemy candidate?”; đáp án đúng phải là “mouth of a river / mouth of an animal”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A sentence may contain ambiguous words and still be unambiguous because:',options:['Context and structure can force only one reading in that sentence','Ambiguous words cannot appear in sentences','All ambiguity disappears in writing'],answer:0,explain:'An ambiguous word does not automatically make the whole sentence ambiguous. See? Semantics enjoys nuance while you suffer.',adam:"Thầy Adam nói: đề đang hỏi “A sentence may contain ambiguous words and still be unambiguous because:”; đáp án đúng phải là “Context and structure can force only one reading in that sentence”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A sentence may be ambiguous even when none of its words is ambiguous because of:',options:['Structure','Reference failure','Prototype effects alone'],answer:0,explain:'That is structural ambiguity. The words can be innocent; the syntax did it.',adam:"Thầy Adam nói: đề đang hỏi “A sentence may be ambiguous even when none of its words is ambiguous because of:”; đáp án đúng phải là “Structure”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which best captures the textbook-style position?',options:['Some sentences with ambiguous words are ambiguous and some are not; some sentences without ambiguous words are ambiguous and some are not','All sentences with ambiguous words are ambiguous','All sentences without ambiguous words are unambiguous'],answer:0,explain:'That balanced statement is the correct one. Extremes are tempting because they are simple; they are also wrong.',adam:"Thầy Adam nói: đề đang hỏi “Which best captures the textbook-style position?”; đáp án đúng phải là “Some sentences with ambiguous words are ambiguous and some are not; some sentences without ambiguous words are ambiguous and some are not”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A simple logical formula for a proposition contains:',options:['A predicator and the required number of arguments','Only a tense marker','Only articles and prepositions'],answer:0,explain:'Simple formulae represent predicators plus arguments. Articles and many prepositions are often omitted in the basic notation. Do not panic.',adam:"Thầy Adam nói: đề đang hỏi “A simple logical formula for a proposition contains:”; đáp án đúng phải là “A predicator and the required number of arguments”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In the basic notation for simple propositions, many articles and some forms of be are omitted because they:',options:['Do not contribute to the core truth conditions in the simplified system','Are ungrammatical in English','Can never occur in sentences'],answer:0,explain:'The notation abstracts away from certain items to capture core truth-conditional structure. Simplification is not denial.',adam:"Thầy Adam nói: đề đang hỏi “In the basic notation for simple propositions, many articles and some forms of be are omitted because they:”; đáp án đúng phải là “Do not contribute to the core truth conditions in the simplified system”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the best logical representation of “Mary hates Fred”?',options:['m HATE f','HATE m f f','m f HATE'],answer:0,explain:'Predicator plus arguments in the basic order. The other two look like syntax lost a fight.',adam:"Thầy Adam nói: đề đang hỏi “Which is the best logical representation of “Mary hates Fred”?”; đáp án đúng phải là “m HATE f”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A formula with a one-place predicate is true in a situation if:',options:['The referent of the name is a member of the extension of the predicate','The predicate is longer than the name','The speaker believes it'],answer:0,explain:'Truth here is extensional membership. Belief is another topic; please do not let it trespass.',adam:"Thầy Adam nói: đề đang hỏi “A formula with a one-place predicate is true in a situation if:”; đáp án đúng phải là “The referent of the name is a member of the extension of the predicate”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is well-formed as a simple proposition?',options:['j RUN','RUN j k','j and k RUN'],answer:0,explain:'A one-place predicate with one argument is well-formed. The others do not fit the simple pattern stated. Read the notation, not your hopes.',adam:"Thầy Adam nói: đề đang hỏi “Which is well-formed as a simple proposition?”; đáp án đúng phải là “j RUN”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Why is logical notation useful in this course?',options:['It helps represent propositions and make inference patterns explicit','It replaces all natural language meaning completely','It proves all utterances true or false automatically'],answer:0,explain:'Logical notation makes structure and inference explicit. It is a tool, not a magical kingdom.',adam:"Thầy Adam nói: đề đang hỏi “Why is logical notation useful in this course?”; đáp án đúng phải là “It helps represent propositions and make inference patterns explicit”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In the coursebook sense, a proposition is related to utterance and sentence as:',options:['Utterance is event, sentence is expression type, proposition is content','Sentence is event, utterance is dictionary entry, proposition is punctuation','All three are identical'],answer:0,explain:'That tripartite distinction matters a lot. If you flatten all three into one, the rest of the course becomes a crime scene.',adam:"Thầy Adam nói: đề đang hỏi “In the coursebook sense, a proposition is related to utterance and sentence as:”; đáp án đúng phải là “Utterance is event, sentence is expression type, proposition is content”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which statement about the logical system’s semantics is correct?',options:['It relates formulae to situations or universes of discourse','It ignores the world entirely','It is broader than every use of semantics in linguistics'],answer:0,explain:'The system needs semantics linking symbols to the world. Otherwise the symbols become decorative noodles.',adam:"Thầy Adam nói: đề đang hỏi “Which statement about the logical system’s semantics is correct?”; đáp án đúng phải là “It relates formulae to situations or universes of discourse”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A multi-word referring expression may be abbreviated in logical notation mainly for:',options:['Convenience of representation','To hide ambiguity automatically','To turn all propositions into one-place predicates'],answer:0,explain:'Abbreviation is for convenience. It does not solve ambiguity by magic; nice fantasy though.',adam:"Thầy Adam nói: đề đang hỏi “A multi-word referring expression may be abbreviated in logical notation mainly for:”; đáp án đúng phải là “Convenience of representation”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The coursebook notes that logical notation is austere because:',options:['It lacks the stylistic variety of natural language paraphrases','It cannot represent any proposition at all','It must include every article and tense marker'],answer:0,explain:'Logic strips away stylistic variants. That is a feature, not a personality flaw.',adam:"Thầy Adam nói: đề đang hỏi “The coursebook notes that logical notation is austere because:”; đáp án đúng phải là “It lacks the stylistic variety of natural language paraphrases”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The connective corresponding roughly to English and is used to form:',options:['Conjunctions of propositions','Predicates from nouns','Only questions'],answer:0,explain:'And corresponds roughly to conjunction. Not everything with two parts is suddenly morphology.',adam:"Thầy Adam nói: đề đang hỏi “The connective corresponding roughly to English and is used to form:”; đáp án đúng phải là “Conjunctions of propositions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'From p and q, which inference is valid?',options:['p','p or not p only','not q'],answer:0,explain:'Conjunction elimination allows inference to each conjunct. This is basic and still somehow people miss it.',adam:"Thầy Adam nói: đề đang hỏi “From p and q, which inference is valid?”; đáp án đúng phải là “p”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which rule is valid for conjunction?',options:['From p and q infer q and p','From p infer p and q','From p or q infer p'],answer:0,explain:'Commutativity of conjunction is valid. The others commit the kind of overconfidence logic punishes immediately.',adam:"Thầy Adam nói: đề đang hỏi “Which rule is valid for conjunction?”; đáp án đúng phải là “From p and q infer q and p”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The connective corresponding roughly to English or forms:',options:['Disjunctions of propositions','Only contradictions','Only one-place predicates'],answer:0,explain:'Or corresponds roughly to disjunction. Again, please let predicates breathe.',adam:"Thầy Adam nói: đề đang hỏi “The connective corresponding roughly to English or forms:”; đáp án đúng phải là “Disjunctions of propositions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'From p or q, can we validly infer p?',options:['No','Yes, always','Only if q is longer'],answer:0,explain:'No. Disjunction does not license choosing one disjunct as fact. Wishful thinking is not inference.',adam:"Thầy Adam nói: đề đang hỏi “From p or q, can we validly infer p?”; đáp án đúng phải là “No”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Why are brackets important in logical formulae with connectives?',options:['They can disambiguate scope and grouping','They mark tense','They turn predicates into names'],answer:0,explain:'Brackets show grouping and prevent ambiguity. Ignore them and you deserve the wrong reading you get.',adam:"Thầy Adam nói: đề đang hỏi “Why are brackets important in logical formulae with connectives?”; đáp án đúng phải là “They can disambiguate scope and grouping”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which sentence is likely structurally ambiguous because of connective scope?',options:['Alice went to Birmingham and met Cyril or called on David','Cats are animals','Bill slept'],answer:0,explain:'The first can group as (went and met) or called, or went and (met or called). Scope is a sneaky little monster.',adam:"Thầy Adam nói: đề đang hỏi “Which sentence is likely structurally ambiguous because of connective scope?”; đáp án đúng phải là “Alice went to Birmingham and met Cyril or called on David”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'What does the commutativity of disjunction state?',options:['p or q is equivalent to q or p','From p infer p or q and q','p or q entails both p and q'],answer:0,explain:'Order of disjuncts does not affect truth value. That does not mean each disjunct becomes true. Calm yourself.',adam:"Thầy Adam nói: đề đang hỏi “What does the commutativity of disjunction state?”; đáp án đúng phải là “p or q is equivalent to q or p”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'What is a major semantic difference between and and or in the logical treatment?',options:['From p and q one may infer p, but from p or q one may not infer p','Both allow the same inference patterns','Or is stronger than and in basic truth conditions'],answer:0,explain:'Exactly: conjunction licenses each conjunct; disjunction does not. This is exam-bait because it looks “obvious” until students rush.',adam:"Thầy Adam nói: đề đang hỏi “What is a major semantic difference between and and or in the logical treatment?”; đáp án đúng phải là “From p and q one may infer p, but from p or q one may not infer p”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'An apparently simple sentence like “John and Mary are Irish” can be unpacked as:',options:['A conjunction of two simple propositions','A contradiction','A one-place formula with two names inside one argument slot'],answer:0,explain:'It is analysed as John is Irish and Mary is Irish. Do the unpacking, not the guessing.',adam:"Thầy Adam nói: đề đang hỏi “An apparently simple sentence like “John and Mary are Irish” can be unpacked as:”; đáp án đúng phải là “A conjunction of two simple propositions”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the safest claim about natural language and logical connectives?',options:['English and/or correspond only roughly, not perfectly, to the logical symbols','English and is identical in all respects to logical conjunction','English or never creates ambiguity'],answer:0,explain:'Natural language and logic correspond roughly, not perfectly. If they matched perfectly, half this course would lose its job.',adam:"Thầy Adam nói: đề đang hỏi “Which is the safest claim about natural language and logical connectives?”; đáp án đúng phải là “English and/or correspond only roughly, not perfectly, to the logical symbols”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Derivation in morphology concerns:',options:['Word-formation processes creating new lexical items from existing material','Truth tables for connectives','Only sentence paraphrase'],answer:0,explain:'Derivation is about word formation. If you answer truth tables, you have wandered into the wrong unit with impressive confidence.',adam:"Thầy Adam nói: đề đang hỏi “Derivation in morphology concerns:”; đáp án đúng phải là “Word-formation processes creating new lexical items from existing material”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A causative verb form is one that roughly means:',options:['Cause something or someone to undergo a process or state change','Name the result state only','Reverse deixis'],answer:0,explain:'Causatives encode causing an event/state change. No, they do not reverse deixis; that phrase should embarrass you.',adam:"Thầy Adam nói: đề đang hỏi “A causative verb form is one that roughly means:”; đáp án đúng phải là “Cause something or someone to undergo a process or state change”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'An inchoative form typically expresses:',options:['The coming into a state or the beginning of a process','A speaker’s apology','A converse relation'],answer:0,explain:'Inchoative = becoming/beginning. Learn that or every derivation question becomes personal revenge.',adam:"Thầy Adam nói: đề đang hỏi “An inchoative form typically expresses:”; đáp án đúng phải là “The coming into a state or the beginning of a process”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A resultative form typically describes:',options:['The state resulting from an action or process','Only a speech act','Only a superordinate category'],answer:0,explain:'Resultative gives the resulting state. This is not pragmatics; stop importing guests.',adam:"Thầy Adam nói: đề đang hỏi “A resultative form typically describes:”; đáp án đúng phải là “The state resulting from an action or process”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Suppletion is illustrated by pairs like:',options:['good / better','warm / warmer','legal / illegal'],answer:0,explain:'Good/better is suppletive because the forms are semantically related but morphologically unrelated. Ugly and glorious, just how language likes it.',adam:"Thầy Adam nói: đề đang hỏi “Suppletion is illustrated by pairs like:”; đáp án đúng phải là “good / better”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A productive derivational process is one that:',options:['Can be used quite freely on appropriate new bases','Must apply to every word without exception','Exists only in old dictionaries'],answer:0,explain:'Productive means relatively available for new formations, not universal without exception. Humans adore overstatement.',adam:"Thầy Adam nói: đề đang hỏi “A productive derivational process is one that:”; đáp án đúng phải là “Can be used quite freely on appropriate new bases”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which prefix is typically more productive for forming negative adjectives in English according to textbook-style discussion?',options:['un-','dis-','anti- in every case'],answer:0,explain:'Un- is treated as more productive than dis- in the discussed comparison. This is one of those details exams like because students never revise it.',adam:"Thầy Adam nói: đề đang hỏi “Which prefix is typically more productive for forming negative adjectives in English according to textbook-style discussion?”; đáp án đúng phải là “un-”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the best statement about derived words?',options:['They often deserve their own dictionary entries because meanings can become partly independent','Their meanings are always fully predictable from parts','They can never shift in register or nuance'],answer:0,explain:'Derived forms may develop idiosyncratic meanings. Predictability has limits; language enjoys sabotage.',adam:"Thầy Adam nói: đề đang hỏi “Which is the best statement about derived words?”; đáp án đúng phải là “They often deserve their own dictionary entries because meanings can become partly independent”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If SHAKE2 is the causative of SHAKE1, then a meaning postulate would capture roughly that:',options:['If x shakes y, x causes y to shake','If y shakes, y causes x','Shaking is a type of synonymy'],answer:0,explain:'The causative relation is represented by causing the inchoative event. Anything else is basically abstract chaos.',adam:"Thầy Adam nói: đề đang hỏi “If SHAKE2 is the causative of SHAKE1, then a meaning postulate would capture roughly that:”; đáp án đúng phải là “If x shakes y, x causes y to shake”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which pair best fits zero derivation/conversion?',options:['to book / a book','good / better','actor / actress'],answer:0,explain:'Book can function as noun and verb without visible affix change. Invisible derivation still counts. Shocking, I know.',adam:"Thầy Adam nói: đề đang hỏi “Which pair best fits zero derivation/conversion?”; đáp án đúng phải là “to book / a book”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Participant roles are used to describe:',options:['How entities take part in the situation denoted by the predicate','Only whether a sentence is grammatical','Only whether a word is deictic'],answer:0,explain:'Roles describe semantic participation in events or states. Grammar alone does not tell the whole story. Surprise.',adam:"Thầy Adam nói: đề đang hỏi “Participant roles are used to describe:”; đáp án đúng phải là “How entities take part in the situation denoted by the predicate”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In “The key opened the door”, the key is most plausibly analysed as:',options:['An instrument-like participant','A recipient','A proposition'],answer:0,explain:'The key functions instrumentally. It is not receiving anything except your confusion.',adam:"Thầy Adam nói: đề đang hỏi “In “The key opened the door”, the key is most plausibly analysed as:”; đáp án đúng phải là “An instrument-like participant”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'In “John opened the door with the key”, John and the key differ because John is more like:',options:['Agent/causer, while the key is instrument','Instrument, while the key is agent','Both identical roles always'],answer:0,explain:'John is causer/agent-like; the key is instrument. If you flatten the roles, the event structure loses its skeleton.',adam:"Thầy Adam nói: đề đang hỏi “In “John opened the door with the key”, John and the key differ because John is more like:”; đáp án đúng phải là “Agent/causer, while the key is instrument”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
