  {unit:'',question:'Why are participant roles useful?',options:['They help explain regularities across different predicates and sentence patterns','They replace all predicate meanings entirely','They matter only for poetry'],answer:0,explain:'Roles reveal cross-predicate semantic patterns. Not everything is replaced by them, and no, poetry is not the only customer.',adam:"Thầy Adam nói: đề đang hỏi “Why are participant roles useful?”; đáp án đúng phải là “They help explain regularities across different predicates and sentence patterns”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'The subject of an English sentence is not always the semantic agent, as shown by:',options:['The key opened the door','John ran quickly','Mary laughed'],answer:0,explain:'The key is grammatical subject but not a typical agent. This is why syntax and semantics should not be married off too quickly.',adam:"Thầy Adam nói: đề đang hỏi “The subject of an English sentence is not always the semantic agent, as shown by:”; đáp án đúng phải là “The key opened the door”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which option best shows an affected participant or patient/theme role?',options:['the door in John opened the door','John in John opened the door','quickly in John opened the door quickly'],answer:0,explain:'The door is the affected entity. The adverb is not a participant role candidate; stop bullying adverbs.',adam:"Thầy Adam nói: đề đang hỏi “Which option best shows an affected participant or patient/theme role?”; đáp án đúng phải là “the door in John opened the door”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A semantic analysis using participant roles is especially helpful when:',options:['Different surface forms describe similar underlying event roles','We only care about spelling','There are no predicates involved'],answer:0,explain:'Roles help compare different syntactic realizations of similar event structures. Spelling can wait outside.',adam:"Thầy Adam nói: đề đang hỏi “A semantic analysis using participant roles is especially helpful when:”; đáp án đúng phải là “Different surface forms describe similar underlying event roles”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the safest generalization?',options:['Participant roles belong to semantic analysis, not merely word order description','Participant roles are identical with case endings in every language','Participant roles only matter in imperative sentences'],answer:0,explain:'Roles are semantic notions. They may interact with syntax but are not reducible to it. Please allow complexity to exist.',adam:"Thầy Adam nói: đề đang hỏi “Which is the safest generalization?”; đáp án đúng phải là “Participant roles belong to semantic analysis, not merely word order description”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If a verb alternates between inchoative and causative uses, participant-role analysis helps because it shows:',options:['How the causer may be added in the causative version','That no meaning changes at all','That the object becomes a pronoun automatically'],answer:0,explain:'Causative alternation adds a causer relation over the inchoative event. That is exactly the point. Try not to blink past it.',adam:"Thầy Adam nói: đề đang hỏi “If a verb alternates between inchoative and causative uses, participant-role analysis helps because it shows:”; đáp án đúng phải là “How the causer may be added in the causative version”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which sentence is most useful for showing instrumentality?',options:['The chef cut the bread with a knife','The bread is fresh','Knives are useful'],answer:0,explain:'With a knife clearly introduces an instrument. The other sentences are innocent and semantically boring for this purpose.',adam:"Thầy Adam nói: đề đang hỏi “Which sentence is most useful for showing instrumentality?”; đáp án đúng phải là “The chef cut the bread with a knife”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Conversational implicature is an inferred meaning that arises from:',options:['How an utterance is used in context, often guided by conversational expectations','Only dictionary definitions','Only grammaticality judgments'],answer:0,explain:'Implicature depends on pragmatic inference in context. Dictionaries alone do not generate it. People do, unfortunately.',adam:"Thầy Adam nói: đề đang hỏi “Conversational implicature is an inferred meaning that arises from:”; đáp án đúng phải là “How an utterance is used in context, often guided by conversational expectations”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If someone asks “Do you eat fish?” and the reply is “I am a vegetarian”, the likely effect is:',options:['An implicature that the speaker does not eat fish','A truth-condition that vegetarian means fish','Pure contradiction'],answer:0,explain:'The reply implicates a negative answer. This is the kind of indirectness humans love and exams weaponize.',adam:"Thầy Adam nói: đề đang hỏi “If someone asks “Do you eat fish?” and the reply is “I am a vegetarian”, the likely effect is:”; đáp án đúng phải là “An implicature that the speaker does not eat fish”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A cancellable implicature is one that:',options:['Can be explicitly withdrawn without contradiction','Can never be denied','Is part of literal sentence meaning'],answer:0,explain:'Implicatures can be cancelled. That is one key sign they are pragmatic, not literal semantic content.',adam:"Thầy Adam nói: đề đang hỏi “A cancellable implicature is one that:”; đáp án đúng phải là “Can be explicitly withdrawn without contradiction”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“Some of my friends are linguists” often implicates:',options:['Not all of my friends are linguists','All of them are linguists','None are linguists'],answer:0,explain:'The usual scalar implicature is “not all”. If you missed this, pragmatics is already writing your obituary.',adam:"Thầy Adam nói: đề đang hỏi ““Some of my friends are linguists” often implicates:”; đáp án đúng phải là “Not all of my friends are linguists”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'That implicature can be cancelled by continuing with:',options:['in fact, all of them are','therefore none are','which is impossible semantically'],answer:0,explain:'Yes, “some, in fact all” sounds pragmatically marked but not contradictory. This distinction matters. A lot.',adam:"Thầy Adam nói: đề đang hỏi “That implicature can be cancelled by continuing with:”; đáp án đúng phải là “in fact, all of them are”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which best distinguishes implicature from entailment?',options:['Implicature is defeasible/cancellable; entailment is not','Entailment depends only on politeness','Implicature is always false'],answer:0,explain:'Defeasibility is key. Entailment survives cancellation attempts; implicature does not. Please tattoo this on your revision sheet.',adam:"Thầy Adam nói: đề đang hỏi “Which best distinguishes implicature from entailment?”; đáp án đúng phải là “Implicature is defeasible/cancellable; entailment is not”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If B answers a question indirectly but relevantly, listeners often infer extra meaning because they assume:',options:['Cooperative conversational behavior','Random noise production','Morphological derivation'],answer:0,explain:'Conversation usually relies on cooperation expectations. Morphology is not running the dinner table.',adam:"Thầy Adam nói: đề đang hỏi “If B answers a question indirectly but relevantly, listeners often infer extra meaning because they assume:”; đáp án đúng phải là “Cooperative conversational behavior”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is the best test for implicature here?',options:['Can the extra meaning be cancelled while the utterance remains non-contradictory?','Can the sentence be written in capitals?','Can the speaker whisper it?'],answer:0,explain:'Cancellability is a strong diagnostic. Capital letters remain hilariously irrelevant.',adam:"Thầy Adam nói: đề đang hỏi “Which is the best test for implicature here?”; đáp án đúng phải là “Can the extra meaning be cancelled while the utterance remains non-contradictory?”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'If a teacher says “The students who answered Section A passed”, a possible implicature is that:',options:['Those who did not answer Section A may not have passed','Section A is a verb','Passing and answering are synonyms'],answer:0,explain:'That is a reasonable implicature based on informativeness. It is not entailed, and that difference is the whole game.',adam:"Thầy Adam nói: đề đang hỏi “If a teacher says “The students who answered Section A passed”, a possible implicature is that:”; đáp án đúng phải là “Those who did not answer Section A may not have passed”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A reply like “I’ll need my calculator” to “How much do I owe you?” can implicate that:',options:['The debt is large or complicated to compute','No debt exists','Calculators are semantically empty'],answer:0,explain:'That indirect reply suggests a lot to calculate. Humans really will imply anything except the answer itself.',adam:"Thầy Adam nói: đề đang hỏi “A reply like “I’ll need my calculator” to “How much do I owe you?” can implicate that:”; đáp án đúng phải là “The debt is large or complicated to compute”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'An idiom is a multi-word expression whose meaning is:',options:['Not fully predictable from the literal meanings of the parts','Always identical to its literal interpretation','Always logically contradictory'],answer:0,explain:'Idioms are partly or wholly non-literal and fixed. Literal-only thinking gets murdered here, politely.',adam:"Thầy Adam nói: đề đang hỏi “An idiom is a multi-word expression whose meaning is:”; đáp án đúng phải là “Not fully predictable from the literal meanings of the parts”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“He put his foot in his mouth” idiomatically means something like:',options:['He said something inappropriate','He physically tasted his shoe','He became taller'],answer:0,explain:'The idiomatic meaning is about saying something embarrassing. Please do not imagine the literal scene in the exam hall.',adam:"Thầy Adam nói: đề đang hỏi ““He put his foot in his mouth” idiomatically means something like:”; đáp án đúng phải là “He said something inappropriate”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Metaphor involves understanding one thing in terms of:',options:['Another conceptual domain','Only its dictionary spelling','Purely random sound resemblance'],answer:0,explain:'Metaphor maps one domain onto another. Random sound resemblance is not invited.',adam:"Thầy Adam nói: đề đang hỏi “Metaphor involves understanding one thing in terms of:”; đáp án đúng phải là “Another conceptual domain”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'“My car is a lemon” is a metaphorical or figurative use because:',options:['The car is compared to a worthless or defective thing, not literally a fruit','Cars are part of the extension of LEMON','It is a deictic expression'],answer:0,explain:'Exactly: lemon is used figuratively to mean a defective product. No fruit salad semantics, please.',adam:"Thầy Adam nói: đề đang hỏi ““My car is a lemon” is a metaphorical or figurative use because:”; đáp án đúng phải là “The car is compared to a worthless or defective thing, not literally a fruit”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Metonymy differs from metaphor because metonymy typically involves:',options:['A close association within one conceptual frame, like container for contents or place for institution','Opposite ends of a scale','Random contradiction'],answer:0,explain:'Metonymy is association-based, not cross-domain comparison like metaphor. Different figurative mechanism, same exam cruelty.',adam:"Thầy Adam nói: đề đang hỏi “Metonymy differs from metaphor because metonymy typically involves:”; đáp án đúng phải là “A close association within one conceptual frame, like container for contents or place for institution”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which is a likely metonymic use?',options:['The White House announced a new policy','Time is a thief','The soup is hot'],answer:0,explain:'The White House stands for the institution or people in it. Buildings do not normally hold press conferences by themselves.',adam:"Thầy Adam nói: đề đang hỏi “Which is a likely metonymic use?”; đáp án đúng phải là “The White House announced a new policy”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'A literal interpretation becomes less likely when:',options:['It yields anomaly and a figurative reading fits the context better','The sentence contains a noun','The speaker uses correct pronunciation'],answer:0,explain:'Anomalous literal readings often invite figurative interpretation. This is where context rescues understanding from nonsense.',adam:"Thầy Adam nói: đề đang hỏi “A literal interpretation becomes less likely when:”; đáp án đúng phải là “It yields anomaly and a figurative reading fits the context better”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Many idioms still show partial compositionality because:',options:['Parts of their figurative meanings can be motivated metaphorically','Every idiom is literally transparent','Composition never matters in semantics'],answer:0,explain:'Some idioms are partly motivated, often by metaphor. Not fully transparent, but not pure chaos either.',adam:"Thầy Adam nói: đề đang hỏi “Many idioms still show partial compositionality because:”; đáp án đúng phải là “Parts of their figurative meanings can be motivated metaphorically”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Which best separates idiom from free combination?',options:['Idioms have conventionalized non-literal meaning not fully predictable from their parts','Idioms are always shorter','Idioms cannot contain verbs'],answer:0,explain:'Conventionalized non-literal meaning is the key. Length is not the issue; please stop making up criteria.',adam:"Thầy Adam nói: đề đang hỏi “Which best separates idiom from free combination?”; đáp án đúng phải là “Idioms have conventionalized non-literal meaning not fully predictable from their parts”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."},
  {unit:'',question:'Why does context matter in figurative meaning?',options:['It helps decide whether literal or non-literal interpretation is intended','It determines whether a noun is a noun','It eliminates all ambiguity automatically'],answer:0,explain:'Context guides the intended reading. It does not magically erase all ambiguity, sadly for everyone grading papers.',adam:"Thầy Adam nói: đề đang hỏi “Why does context matter in figurative meaning?”; đáp án đúng phải là “It helps decide whether literal or non-literal interpretation is intended”. Bám đúng keyword trong phần giải thích phía trên rồi chốt, đừng tick theo vibe."}

function shuffle(array){
  const a = array.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

const shuffledQuiz = shuffle(quizData).map(q=>{
  const correct = q.options[q.answer];
  const options = shuffle(q.options);
  return {...q, options, answer: options.indexOf(correct)};
});

const teacherLines = ['Em trả lời kiểu này thì nghĩa biểu vật còn quay lưng, nghĩa liên tưởng cũng xin nghỉ việc.','Ngữ nghĩa chưa kịp cứu em thì ngữ âm đã nghe thấy tiếng sai từ xa rồi.','Âm vị học đứng ngoài cửa cũng biết em chọn đáp án theo trực giác hơn là theo lý luận.','Hình thái học ghép tiền tố với hậu tố còn có trật tự, em ghép suy đoán với đáp án thì loạn cả hệ thống.','Cú pháp xếp thành phần còn có cây; em xếp lập luận thì cây nào cũng muốn rụng lá.','Ca dao đã dặn khôn ngoan đối đáp người ngoài, còn em đối đáp với câu hỏi lại chọn nhầm phương án.','Tục ngữ có câu nói có sách mách có chứng, còn em nói có cảm giác mách có linh tính.','Em làm câu này như thể signifier chạy một đường, signified chạy một nẻo, bỏ mặc logic ở giữa đường.','Reference chưa ổn, sense chưa xong, mà em đã vội chọn đáp án như chốt đơn cuối tháng.','Em đối xử với entailment như thể muốn kéo đâu thì kéo, trong khi logic đâu phải dây thun.','Paraphrase với contradiction đang đứng khác chiến tuyến, em vẫn nhất quyết cho hai bên cưới nhau.','Hyponymy đã đi theo chiều trên dưới rất rõ, em vẫn lái ngang như chưa từng học taxonomy.','Nghe em chọn đáp án này, phonetics muốn đo formant lại để xem sai từ nguyên âm hay sai từ tư duy.','Nếu sai thế này nữa thì phonology sẽ xin thêm một distinctive feature tên là [+đoán mò].','Morpheme có bound với free, còn em thì bound với nhiễu và free khỏi đáp án đúng.','Derivation còn tạo được từ mới, chứ em đang derivation ra lỗi mới từ kiến thức cũ.','Syntax ít ra còn biết chỗ nào là head, chỗ nào là complement; em thì cho distractor làm chủ ngữ luôn.','Câu này bracket đặt sai là chết, mà em còn không thèm mang ngoặc vào lập luận.','Em chọn đáp án như tung đồng xu, mà đồng xu còn có xác suất đẹp hơn lập luận của em.','Ngữ dụng đang implicate nhẹ nhàng, em lại infer mạnh tay như đang truy bắt tội phạm.','Implicature là cancellable, còn sự tự tin sai của em hôm nay thì chưa thấy hủy được.','Thầy không trách em sai, thầy trách em sai mà nhìn rất hùng hồn.','Câu này không đánh đố; em tự đem nghĩa đen, nghĩa bóng, nghĩa nào cũng quăng ra khỏi cửa.','Em làm bài kiểu này thì đồng âm khác nghĩa cũng phải đồng lòng phản đối.','Polysemy còn có quan hệ họ hàng, còn đáp án em chọn với đáp án đúng thì tuyệt giao.','Prototype với extension đã khác nhau rõ như trưa với tối, em vẫn trộn lên như nấu chè thập cẩm.','Nói gần nói xa chẳng qua nói thật: em đọc câu hỏi chưa kỹ nên mới yêu nhầm distractor.','Có công mài sắt có ngày nên kim, còn có công đoán bừa thì có ngày nên bi kịch.','Một cây làm chẳng nên non, ba lần đọc kỹ mới mong tránh được đáp án sai cồn cào này.','Khôn đâu đến trẻ, khỏe đâu đến già; chắc đâu đến mức em vừa thấy từ quen là chọn đại.','Em đang làm semantic analysis bằng niềm tin, mà niềm tin thì không phải truth condition.','Nếu đáp án đúng là hạt nhân câu, em vừa đem adjunct lên làm vua.','Chọn thế này thì predicate còn chưa kịp mở miệng, arguments đã bỏ đi hết.','Đề cho universe of discourse rõ ràng, còn em tự mở đa vũ trụ để cứu đáp án sai.','Nghe em lý giải chắc Frege cũng phải day sense của mình thêm vài vòng.','Russell mà xem definite description em xử lý kiểu này chắc mô tả luôn nỗi thất vọng.','Em biến deictic expression thành fixed reference nhanh hơn tốc độ mất điểm.','Câu này sai không phải vì tiếng Anh khó, mà vì em ưu ái đáp án nhiễu như người cũ.','Thầy Adam nói thật, đọc em chọn đáp án này xong thì cả ca dao lẫn logic đều muốn thở dài.'];

const quizList = document.getElementById('quizList');
const answeredCount = document.getElementById('answeredCount');
const correctCount = document.getElementById('correctCount');
const accuracyCount = document.getElementById('accuracyCount');
const progressFill = document.getElementById('progressFill');
let answered = 0, correct = 0;

function renderQuiz(){
  quizList.innerHTML = '';
  shuffledQuiz.forEach((q,index)=>{
    const card = document.createElement('article');
    card.className = 'card';
    card.innerHTML = '<div class="q-top"><div><div class="q-num">Question '+(index+1)+'</div><div class="question">'+q.question+'</div></div><div class="unit"></div></div><div class="options">'+q.options.map((opt,i)=>'<button class="option" data-q="'+index+'" data-opt="'+i+'">'+String.fromCharCode(65+i)+'. '+opt+'</button>').join('')+'</div><div class="feedback"><div class="result"></div><div class="explain"></div><div class="adam"></div></div>';
    quizList.appendChild(card);
  });
  bindOptions(); updateStats();
}

function bindOptions(){
  document.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',()=>{
    const qIndex = Number(btn.dataset.q), optIndex = Number(btn.dataset.opt), q = shuffledQuiz[qIndex];
    const card = btn.closest('.card'), allBtns = card.querySelectorAll('.option'), feedback = card.querySelector('.feedback');
    if(card.dataset.answered==='true') return;
    card.dataset.answered='true';
    answered += 1;
    const isCorrect = optIndex === q.answer;
    if(isCorrect) correct += 1;
    allBtns.forEach((b,i)=>{ b.disabled = true; if(i===q.answer) b.classList.add('correct'); if(i===optIndex && i!==q.answer) b.classList.add('wrong'); });
    feedback.classList.add('show');
    feedback.classList.toggle('correct',isCorrect);
    feedback.classList.toggle('wrong',!isCorrect);
    feedback.querySelector('.result').textContent = isCorrect ? 'Correct.' : 'Not quite.';
    feedback.querySelector('.explain').textContent = q.explain;
    feedback.querySelector('.adam').textContent = q.adam;
    updateStats();
  }));
}

function updateStats(){
  answeredCount.textContent = answered + '/' + shuffledQuiz.length;
  correctCount.textContent = correct;
  const acc = answered ? Math.round((correct/answered)*100) : 0;
  accuracyCount.textContent = acc + '%';
  progressFill.style.width = ((answered/shuffledQuiz.length)*100) + '%';
}

document.getElementById('resetBtn').addEventListener('click',()=>{ answered=0; correct=0; renderQuiz(); window.scrollTo({top:0,behavior:'smooth'}); });
document.getElementById('themeToggle').addEventListener('click',()=>{ const root=document.documentElement; const next=root.getAttribute('data-theme')==='dark'?'light':'dark'; root.setAttribute('data-theme',next); document.getElementById('themeToggle').textContent = next==='dark'?'☀':'☾'; });
renderQuiz();
</script>
